<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; padding: 20px; }
        .box { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #003366; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; font-size: 14px; }
        .btn { padding: 5px 10px; border-radius: 4px; cursor: pointer; border: none; font-size: 12px; color: white; text-decoration: none; }
        .btn-v { background: #28a745; margin-right: 5px; }
        .btn-d { background: #6c757d; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="title">載入中...</h2>
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>代號/名稱</th>
                    <th>券商</th>
                    <th>投資建議</th>
                    <th>目標價</th>
                    <th>功能</th>
                </tr>
            </thead>
            <tbody id="content"></tbody>
        </table>
    </div>

    <script>
        const src = []; // 由 main.py 噴入資料

        function preview(base64) {
            const win = window.open("");
            win.document.write(`<body style="margin:0"><embed width="100%" height="100%" src="${base64}" type="application/pdf"></body>`);
        }

        window.onload = () => {
            const container = document.getElementById('content');
            document.getElementById('title').innerText = `報告清單 (${src.length} 份)`;
            
            if (src.length === 0) {
                container.innerHTML = '<tr><td colspan="6" style="text-align:center;">資料夾內沒有檔案或解析失敗</td></tr>';
                return;
            }

            container.innerHTML = src.map(d => `
                <tr>
                    <td>${d.日期}</td>
                    <td><b>${d.代號}</b><br>${d.名稱}</td>
                    <td>${d.券商}</td>
                    <td>${d.建議}</td>
                    <td style="color:blue; font-weight:bold">${d.目標價}</td>
                    <td>
                        <button class="btn btn-v" onclick="preview('${d.pdfData}')">預覽</button>
                        <a class="btn btn-d" href="${d.pdfData}" download="${d.filename}">下載</a>
                    </td>
                </tr>
            `).join('');
        };
    </script>
</body>
</html>
