<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #1a73e8; color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        .view-btn { background: #34a853; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📑 研究報告列表</h2>
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>個股代號/名稱</th>
                    <th>券商</th>
                    <th>建議</th>
                    <th>目標價</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        // 注意：這裡的變數名要跟 Python 的 .replace 一致
        const reportData = []; 

        window.onload = function() {
            const tbody = document.getElementById('table-body');
            
            if (!reportData || reportData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">暫無資料，請檢查報告資料夾或關閉廣告攔截器</td></tr>';
                return;
            }

            tbody.innerHTML = reportData.map(item => `
                <tr>
                    <td>${item.日期 || '-'}</td>
                    <td><b>${item.代號 || '-'}</b><br>${item.名稱 || '-'}</td>
                    <td>${item.券商 || '-'}</td>
                    <td>${item.建議 || '-'}</td>
                    <td><span style="color:red; font-weight:bold;">${item.目標價 || '-'}</span></td>
                    <td><button class="view-btn" onclick="alert('點擊成功！請確認瀏覽器未封鎖彈出視窗')">查看詳情</button></td>
                </tr>
            `).join('');
        };
    </script>
</body>
</html>
