<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f9f9f9; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #004b97; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
        .btn { background: #28a745; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h3 id="info">正在讀取報告...</h3>
    <table>
        <thead>
            <tr>
                <th>日期</th>
                <th>代號/名稱</th>
                <th>券商</th>
                <th>建議/目標價</th>
                <th>檔案</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>

    <script>
        const src = []; // Python 會填入基礎資料

        window.onload = function() {
            const list = document.getElementById('list');
            document.getElementById('info').innerText = `找到 ${src.length} 份報告`;
            
            list.innerHTML = src.map(d => `
                <tr>
                    <td>${d.日期}</td>
                    <td><b>${d.代號}</b><br>${d.名稱}</td>
                    <td>${d.券商}</td>
                    <td>${d.建議}<br><span style="color:red">${d.目標價}</span></td>
                    <td>
                        <button class="btn" onclick="alert('請在左側 Streamlit 面板查看：' + '${d.filename}')">預覽</button>
                    </td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
