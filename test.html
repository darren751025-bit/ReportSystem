<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>券商研究報告檢索系統</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; color: var(--primary); margin: 0; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f1f5f9; padding: 12px; font-weight: 600; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        tr:hover { background: #f8fafc; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: 500; }
        .buy { background: #dcfce7; color: #166534; }
        .hold { background: #fef9c3; color: #854d0e; }
        .sell { background: #fee2e2; color: #991b1b; }
        .empty-msg { text-align: center; color: #64748b; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 專業研究報告列表</h1>
            <div id="count-info" style="font-size: 0.9rem; color: #64748b;"></div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>代號</th>
                    <th>名稱</th>
                    <th>券商</th>
                    <th>建議</th>
                    <th>目標價</th>
                    <th>昨收</th>
                </tr>
            </thead>
            <tbody id="report-body">
                </tbody>
        </table>
        <div id="empty-box" class="empty-msg" style="display: none;">目前尚無報告資料</div>
    </div>

    <script>
        // 【重要】這行是給 main.py 替換用的，請勿手動更改格式
        const src = []; 

        function renderTable(data) {
            const tbody = document.getElementById('report-body');
            const emptyBox = document.getElementById('empty-box');
            const countInfo = document.getElementById('count-info');
            
            if (!data || data.length === 0) {
                emptyBox.style.display = 'block';
                return;
            }

            countInfo.innerText = `共找到 ${data.length} 份報告`;
            
            tbody.innerHTML = data.map(item => {
                let badgeClass = '';
                if (item.rec && item.rec.includes('買進')) badgeClass = 'buy';
                else if (item.rec && item.rec.includes('持有')) badgeClass = 'hold';
                else if (item.rec && item.rec.includes('賣出')) badgeClass = 'sell';

                return `
                    <tr>
                        <td>${item.date || '-'}</td>
                        <td><strong>${item.code || '-'}</strong></td>
                        <td>${item.name || '-'}</td>
                        <td>${item.broker || '-'}</td>
                        <td><span class="badge ${badgeClass}">${item.rec || '未分類'}</span></td>
                        <td><span style="color:var(--primary);font-weight:600">${item.target || '-'}</span></td>
                        <td>${item.last || '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        // 初始化渲染
        renderTable(src);
    </script>
</body>
</html>
