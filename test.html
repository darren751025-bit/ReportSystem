<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="background: white; padding: 20px;">
    <div id="debug-info" style="color: red; font-weight: bold; margin-bottom: 10px;"></div>
    <table border="1" style="width:100%; border-collapse: collapse;">
        <thead>
            <tr style="background: #f2f2f2;">
                <th>檔案名稱</th>
                <th>動作</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>

    <script>
        // Python 會填入這裡
        const src = []; 

        window.onload = function() {
            const list = document.getElementById('list');
            const debug = document.getElementById('debug-info');

            if (src.length === 0) {
                debug.innerText = "⚠️ 警告：JavaScript 收到的是空陣列，請檢查 Python 是否有抓到 PDF。";
                list.innerHTML = '<tr><td colspan="2">等待資料中...</td></tr>';
            } else {
                debug.innerText = "🟢 JavaScript 已成功接收 " + src.length + " 筆資料";
                debug.style.color = "green";
                list.innerHTML = src.map(item => `
                    <tr>
                        <td>${item.filename}</td>
                        <td><button onclick="window.open().document.write('<iframe width=\\\'100%\\\' height=\\\'100%\\\' src=\\\'${item.pdf}\\\'></iframe>')">開啟報告</button></td>
                    </tr>
                `).join('');
            }
        };
    </script>
</body>
</html>
