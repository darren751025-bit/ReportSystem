<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: sans-serif;">
    <h2 id="st">正在初始化...</h2>
    <table border="1" style="width:100%; border-collapse: collapse;">
        <thead>
            <tr style="background:#eee;">
                <th>檔案名稱</th>
                <th>代號</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="tb"></tbody>
    </table>

    <script>
        const src = []; // Python 注入位置

        window.onload = () => {
            const tb = document.getElementById('tb');
            document.getElementById('st').innerText = `已載入 ${src.length} 筆資料`;
            
            if(src.length === 0) {
                tb.innerHTML = '<tr><td colspan="3">無資料 (src 陣列為空)</td></tr>';
                return;
            }

            tb.innerHTML = src.map(item => `
                <tr>
                    <td>${item.filename}</td>
                    <td>${item.代號}</td>
                    <td><button onclick="window.open().document.write('<iframe src=\\\'${item.pdfData}\\\' width=\\\'100%\\\' height=\\\'100%\\\'></iframe>')">預覽</button></td>
                </tr>
            `).join('');
        };
    </script>
</body>
</html>
