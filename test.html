<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研究報告檢索系統</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1300px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f1f5f9; padding: 12px; text-align: left; border-bottom: 2px solid var(--border); position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        tr:hover { background: #f8fafc; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .buy { background: #dcfce7; color: #166534; }
        .hold { background: #fef9c3; color: #854d0e; }
        .sell { background: #fee2e2; color: #991b1b; }
        .empty { text-align: center; padding: 50px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📈 證券研究報告檢索系統</h2>
            <div id="count-tag">正在讀取報告...</div>
        </div>

        <table id="main-table">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>股票代號</th>
                    <th>公司名稱</th>
                    <th>研究券商</th>
                    <th>投資建議</th>
                    <th>目標價</th>
                    <th>昨收</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
        
        <div id="no-data" class="empty" style="display:none;">
            <h3>📂 暫無資料</h3>
            <p>請確認 reports 資料夾中是否有 PDF 檔案，且解析程式運作正常。</p>
        </div>
    </div>

    <script>
        // 【核心注入點】Python 會把 [] 替換成真實資料
        const src = [];

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const noData = document.getElementById('no-data');
            const countTag = document.getElementById('count-tag');

            if (!src || src.length === 0) {
                document.getElementById('main-table').style.display = 'none';
                noData.style.display = 'block';
                countTag.innerText = "共 0 筆報告";
                return;
            }

            countTag.innerText = `共 ${src.length} 筆報告`;
            
            tbody.innerHTML = src.map(item => {
                let badgeClass = 'hold';
                if (item.rec.includes('買')) badgeClass = 'buy';
                if (item.rec.includes('賣')) badgeClass = 'sell';

                return `
                    <tr>
                        <td style="color: #64748b;">${item.date}</td>
                        <td><strong>${item.code}</strong></td>
                        <td>${item.name}</td>
                        <td>${item.broker}</td>
                        <td><span class="badge ${badgeClass}">${item.rec}</span></td>
                        <td style="color: #2563eb; font-weight:bold;">${item.target}</td>
                        <td>${item.last}</td>
                    </tr>
                `;
            }).join('');
        }

        // 頁面載入後執行
        window.onload = renderTable;
    </script>
</body>
</html>
